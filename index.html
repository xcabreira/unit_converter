<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>unit converter</title>
    <link rel="stylesheet" href="./assets/CSS/reset.css">
    <link rel="stylesheet" href="./assets/CSS/style.css">
    <link rel="stylesheet" href="./assets/CSS/responsive.css">
    <link rel="shortcut icon" href="./assets/IMG/exchange.png" type="image/x-icon">

    <meta name="description" content="Esse projeto tem como intuito agregar ao meu portfólio.">
</head>

<body>
    <header class="nav-bar">
        <nav>
            <p class="h1page">CONVERSOR DE UNIDADES</p>
        </nav>
    </header>
    <main>
        <section>
            <div class="container">

                <!-- Escolhe o tipo de conversao -->
                <label for="tipo">Tipo de conversão: </label>
                <select class="selectStyle" name="tipoConversao" id="tipo">
                    <option value="none">-- Escolha --</option>
                    <option value="moeda">Moeda</option>
                    <option value="medidas">Medidas</option>
                    <option value="massa">Massa</option>
                </select>

                <!-- Insere o valor para conversao -->
                <input class="selectStyle" id="enteredValue" type="number" placeholder="Escolha o tipo de conversão!"
                    disabled>

                <!-- Escolhe de qual tipo é o valor inserido -->
                <label for="fromCurrency">de:</label>
                <select class="selectStyle" name="fromCurrency" id="fromCurrency">
                    <option value=""></option>
                    <option value="" disabled>Escolha um tipo de conversão</option>
                </select>

                <!-- Escolhe para qual tipo será convertido -->
                <label for="toCurrency">para:</label>
                <select class="selectStyle" name="toCurrency" id="toCurrency">
                    <option value=""></option>
                    <option value="" disabled>Escolha um tipo de conversão</option>
                </select>

                <!-- Mostra o resultado da conversão -->
                <label for="resultado">Resultado: </label>
                <input class="selectStyle" type="text" readonly id="resultado">
            </div>
        </section>
    </main>
    <footer id="footer">
        <p>&copy <a href="https://github.com/xcabreira" class="footerLink">Cabreira.dev</a> - Todos os direitos
            reservados</p>
    </footer>
    <script type="module" src="./assets/JS/script.js"></script>
</body>

</html>
